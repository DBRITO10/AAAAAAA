<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Aprovação Comercial | VarejoLog</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
        { "imports": { 
            "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js" 
        } }
    </script>
</head>
<body>
    <nav>
        <span>Painel do Comprador</span>
        <button onclick="logout()">Sair</button>
    </nav>

    <div class="container">
        <div class="card">
            <h2>Cargas Aguardando Validação Comercial</h2>
            <p>Analise a composição antes de autorizar o envio para a logística.</p>
            
            <table id="tab-comprador">
                <thead>
                    <tr>
                        <th>Fornecedor</th>
                        <th>Ref. Carga</th>
                        <th>Composição Detalhada</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/comprador.js"></script>
</body>
</html>
