<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Aprovação Comercial | Comprador</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <span>Portal do Comprador</span>
        <button onclick="logout()">Sair</button>
    </nav>

    <div class="container">
        <div class="card">
            <h2>Cargas Aguardando Validação Comercial</h2>
            <p>Analise a composição antes de autorizar o envio para a logística.</p>
            
            <table id="tab-comprador">
                <thead>
                    <tr>
                        <th>Fornecedor</th>
                        <th>Ref. Carga</th>
                        <th>Composição Detalhada</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { db, auth } from './firebase-config.js';
        import { collection, query, where, onSnapshot, doc, updateDoc } from "firebase/firestore";
        import { signOut, onAuthStateChanged } from "firebase/auth";

        // Segurança de página
        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = "index.html";
        });

        window.logout = () => signOut(auth).then(() => window.location.href = "index.html");

        // APROVAR CARGA (Manda para a Logística)
        window.aprovarCarga = async (id) => {
            try {
                const docRef = doc(db, "agendamentos", id);
                await updateDoc(docRef, { 
                    status: 'pendente_logistica',
                    aprovado_comercial_em: new Date()
                });
                alert("Carga aprovada! Enviada para a Logística.");
            } catch (e) { console.error("Erro ao aprovar:", e); }
        };

        // REJEITAR CARGA
        window.rejeitarCarga = async (id) => {
            if(confirm("Deseja realmente recusar este agendamento?")) {
                await updateDoc(doc(db, "agendamentos", id), { status: 'recusado_comercial' });
            }
        };

        // ESCUTAR CARGAS PENDENTES
        const q = query(collection(db, "agendamentos"), where("status", "==", "pendente_comprador"));
        onSnapshot(q, (snap) => {
            const tbody = document.querySelector('#tab-comprador tbody');
            tbody.innerHTML = snap.docs.map(d => {
                const c = d.data();
                // Monta a string de itens para visualização rápida
                const itensStr = c.itens.map(i => `• ${i.qtd}x ${i.desc} (${i.vol})`).join('<br>');
                
                return `<tr>
                    <td><strong>${c.empresa || 'Verificando...'}</strong></td>
                    <td>${c.ref_carga}</td>
                    <td style="font-size: 0.85em; color: #666;">${itensStr}</td>
                    <td>
                        <button class="btn-approve" onclick="aprovarCarga('${d.id}')">Aprovar</button>
                        <button class="btn-reject" onclick="rejeitarCarga('${d.id}')" style="margin-left:5px">Recusar</button>
                    </td>
                </tr>`;
            }).join('');
            
            if(snap.empty) tbody.innerHTML = "<tr><td colspan='4' style='text-align:center'>Nenhuma carga pendente.</td></tr>";
        });
    </script>
</body>
</html>
