<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login | Sistema de Cargas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <h1>🚚 VarejoLog</h1>
        <p>Acesse seu painel operacional</p>
        
        <input type="email" id="email" placeholder="E-mail profissional">
        <input type="password" id="senha" placeholder="Senha">
        
        <button onclick="login()" class="btn-main">Entrar no Sistema</button>
        <a href="cadastro.html" class="link-secundario">Solicitar novo acesso</a>
        
        <div id="status-msg"></div>
    </div>

    <script type="module">
        import { auth, db, ADMIN_EMAIL } from './firebase-config.js';
        import { signInWithEmailAndPassword, onAuthStateChanged } from "firebase/auth";
        import { doc, getDoc } from "firebase/firestore";

        window.login = async () => {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            try {
                await signInWithEmailAndPassword(auth, email, senha);
            } catch (e) { alert("Erro: " + e.message); }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const uDoc = await getDoc(doc(db, "users", user.uid));
                const data = uDoc.data();
                
                if (user.email !== ADMIN_EMAIL && (!data || !data.aprovado)) {
                    document.getElementById('status-msg').innerHTML = "<p style='color:orange'>Aguardando aprovação do Admin...</p>";
                    return;
                }

                if (user.email === ADMIN_EMAIL) window.location.href = "admin.html";
                else if (data.role === "fornecedor") window.location.href = "fornecedor.html";
                else if (data.role === "comprador") window.location.href = "comprador.html";
            }
        });
    </script>
</body>
</html>
