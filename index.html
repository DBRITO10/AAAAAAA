<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login | VarejoLog</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
        { "imports": { 
            "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js" 
        } }
    </script>
</head>
<body class="auth-page">
    <div class="auth-card">
        <h1>🚚 VarejoLog</h1>
        <p>Acesse seu painel operacional</p>
        <input type="email" id="email" placeholder="E-mail profissional">
        <input type="password" id="senha" placeholder="Senha">
        <button onclick="login()" class="btn-confirm">Entrar no Sistema</button>
        <a href="cadastro.html" class="link-secundario" style="display:block; margin-top:10px; text-align:center;">Solicitar novo acesso</a>
        <div id="status-msg" style="margin-top:15px; text-align:center;"></div>
    </div>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
