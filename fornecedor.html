<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Portal do Fornecedor</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
        { "imports": { 
            "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js" 
        } }
    </script>
</head>
<body>
    <nav>
        <span>Portal do Fornecedor</span>
        <button onclick="logout()">Sair</button>
    </nav>
    <div class="container">
        <div class="card">
            <h3>Novo Agendamento</h3>
            <form id="form-carga">
                <input type="text" id="ref" placeholder="NF ou Número da Carga" required>
                <input type="date" id="data" required>
                <div id="itens-container">
                    <h4>Composição da Carga</h4>
                    <div class="row-item">
                        <input type="text" placeholder="Item" class="i-desc" required>
                        <input type="number" placeholder="Qtd" class="i-qtd" required>
                        <input type="text" placeholder="Volumes" class="i-vol" required>
                    </div>
                </div>
                <button type="button" onclick="addItem()" class="btn-add">+ Adicionar Item</button>
                <button type="submit" class="btn-confirm" style="margin-top:20px;">Enviar para Aprovação</button>
            </form>
        </div>
        <div class="card">
            <h3>Meus Agendamentos</h3>
            <table id="tab-forn">
                <thead><tr><th>Carga</th><th>Data</th><th>Status</th><th>Senha</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
    <script type="module" src="js/fornecedor.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
